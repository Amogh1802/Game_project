<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Mana</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Georgia', serif; overscroll-behavior: none; touch-action: none; }
    #game-canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }

    #loading-screen {
      position: absolute; inset: 0; background: #0a0a1a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100; transition: opacity 1s ease;
    }
    #loading-screen h1 { color: #f9d4e8; font-size: 2.4rem; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
    #loading-screen p  { color: #b89daa; font-size: 1rem; margin-bottom: 2rem; letter-spacing: 0.05em; }
    .loading-bar-wrap  { width: 240px; height: 4px; background: #2a1a2e; border-radius: 4px; overflow: hidden; }
    .loading-bar-fill  { height: 100%; width: 0%; background: linear-gradient(90deg, #d4a0c0, #f9d4e8); border-radius: 4px; transition: width 0.4s ease; }

    #hud {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      color: #f9d4e8; font-size: 0.85rem; letter-spacing: 0.1em;
      text-shadow: 0 1px 6px rgba(0,0,0,0.6); pointer-events: none;
      opacity: 0; transition: opacity 1s ease;
    }
    #interact-prompt {
      position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(10,5,20,0.75); color: #f9d4e8;
      padding: 10px 24px; border-radius: 30px;
      border: 1px solid rgba(249,212,232,0.3);
      font-size: 0.9rem; letter-spacing: 0.06em;
      pointer-events: none; opacity: 0; transition: opacity 0.3s ease;
    }
    #controls-hint {
      position: absolute; bottom: 20px; right: 24px;
      color: rgba(255,255,255,0.35); font-size: 0.72rem;
      letter-spacing: 0.08em; pointer-events: none;
      line-height: 1.8; text-align: right;
    }
  </style>
</head>
<body>

<canvas id="game-canvas"></canvas>

<div id="loading-screen">
  <h1>Happy Birthday, Mana</h1>
  <p>a little world made just for you</p>
  <div class="loading-bar-wrap">
    <div class="loading-bar-fill" id="loading-bar"></div>
  </div>
</div>

<div id="hud">Enchanted Meadow</div>
<div id="interact-prompt"></div>
<div id="controls-hint">W A S D — move<br>Mouse drag — rotate camera<br>E — interact</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/@emailjs/browser@4/dist/email.min.js"></script>
<script>
  (function() {
    emailjs.init({ publicKey: 'PiwSZuasskT-AQZMB' });
  })();

<script>
/* ============================================================
   M1 — SCENE FOUNDATION
   Sky, ground, lighting, camera, render loop
============================================================ */

const canvas   = document.getElementById('game-canvas');

// Detect touch/mobile devices up front so we can dial back GPU-heavy
// settings (AA, shadow resolution, pixel ratio) where it matters most —
// desktop rendering quality is untouched.
const IS_MOBILE = ('ontouchstart' in window) || navigator.maxTouchPoints > 0 ||
                   window.matchMedia('(hover: none) and (pointer: coarse)').matches;

// Low-end tier: weak CPUs/GPUs get a further-reduced quality pass.
// hardwareConcurrency/deviceMemory aren't available on every browser,
// so this only ever makes things *more* conservative, never assumes a
// device is powerful when we simply don't know.
const IS_LOW_END = IS_MOBILE && (
  (navigator.hardwareConcurrency && navigator.hardwareConcurrency <= 4) ||
  (navigator.deviceMemory && navigator.deviceMemory <= 4)
);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: !IS_MOBILE, powerPreference: 'high-performance' });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, IS_LOW_END ? 1 : (IS_MOBILE ? 1.5 : 2)));
// Shadow mapping is one of the single most expensive things a weak mobile
// GPU can be asked to do (a whole extra depth pass + filtering per pixel) —
// low-end devices skip it entirely rather than just shrinking it.
renderer.shadowMap.enabled = !IS_LOW_END;
renderer.shadowMap.type    = IS_MOBILE ? THREE.PCFShadowMap : THREE.PCFSoftShadowMap;
renderer.toneMapping       = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.fog   = new THREE.FogExp2(0xc9dba8, 0.014);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 400);
camera.position.set(0, 3, 10);

// ── Initialise window.GAME immediately so all sub-functions below can use it ──
window.GAME = { scene, camera, renderer, clock: new THREE.Clock(), updaters: [] };

// 🌌 Night Sky Gradient
(function buildSky() {
  const skyGeo = new THREE.SphereGeometry(300, 32, 32);

  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,

    uniforms: {

      // Deep space
      topColor: {
        value: new THREE.Color(0x030712)
      },

      // Moonlit blue
      midColor: {
        value: new THREE.Color(0x10213d)
      },

      // Slight purple glow near horizon
      bottomColor: {
        value: new THREE.Color(0x1f1635)
      },

      offset: {
        value: 28
      },

      exponent: {
        value: 0.55
      }

    },

    vertexShader: `
      varying vec3 vWorldPosition;

      void main() {

        vec4 wp = modelMatrix * vec4(position,1.0);

        vWorldPosition = wp.xyz;

        gl_Position = projectionMatrix *
                      modelViewMatrix *
                      vec4(position,1.0);

      }
    `,

    fragmentShader: `
      uniform vec3 topColor;
      uniform vec3 midColor;
      uniform vec3 bottomColor;

      uniform float offset;
      uniform float exponent;

      varying vec3 vWorldPosition;

      void main() {

        float h = normalize(vWorldPosition + offset).y;

        float t = max(pow(max(h,0.0), exponent),0.0);

        vec3 col = mix(
            bottomColor,
            midColor,
            smoothstep(0.0,0.35,t)
        );

        col = mix(
            col,
            topColor,
            smoothstep(0.35,1.0,t)
        );

        gl_FragColor = vec4(col,1.0);

      }
    `
  });

  scene.add(new THREE.Mesh(skyGeo, skyMat));

})();

// 🌕 Full Moon + Soft Glow
(function buildMoon() {

const MOON_POS = new THREE.Vector3(80, 45, -120);
  // Outer glow
  const halo = new THREE.Mesh(
    new THREE.CircleGeometry(20, 48),
    new THREE.MeshBasicMaterial({
      color: 0xaecbff,
      transparent: true,
      opacity: 0.12,
      side: THREE.DoubleSide,
      depthWrite: false
    })
  );
  halo.position.copy(MOON_POS);
  halo.lookAt(0, 0, 0);
  scene.add(halo);

  // Middle glow
  const glow = new THREE.Mesh(
    new THREE.CircleGeometry(13, 48),
    new THREE.MeshBasicMaterial({
      color: 0xdde9ff,
      transparent: true,
      opacity: 0.25,
      side: THREE.DoubleSide,
      depthWrite: false
    })
  );
  glow.position.copy(MOON_POS);
  glow.lookAt(0, 0, 0);
  scene.add(glow);

  // Moon
  const moon = new THREE.Mesh(
    new THREE.CircleGeometry(6.5, 64),
    new THREE.MeshBasicMaterial({
      color: 0xf6f8ff,
      side: THREE.DoubleSide,
      depthWrite: false
    })
  );
  moon.position.copy(MOON_POS);
  moon.lookAt(0, 0, 0);
  scene.add(moon);

  // Very subtle moon texture (craters)
  const craterMat = new THREE.MeshBasicMaterial({
    color: 0xd9ddea,
    transparent: true,
    opacity: 0.35,
    depthWrite: false
  });

  [
    [-1.5,1.0,0.65],
    [1.2,-0.8,0.5],
    [0.7,1.7,0.35],
    [-2.0,-1.5,0.45],
    [2.0,1.1,0.28]
  ].forEach(([x,y,r]) => {

    const crater = new THREE.Mesh(
      new THREE.CircleGeometry(r,24),
      craterMat
    );

    crater.position.set(
      MOON_POS.x + x,
      MOON_POS.y + y,
      MOON_POS.z + 0.05
    );

    crater.lookAt(0,0,0);

    scene.add(crater);

  });

  // Store moon position for lighting
  window.GAME.sunPos = MOON_POS;

})();

// Clouds — fluffy layered puffs drifting slowly
(function buildClouds() {
  const cloudMat = new THREE.MeshLambertMaterial({
    color: 0xffffff, transparent: true, opacity: 0.82
  });
  const cloudList = [];

  function makeCloud(x, y, z, scale) {
    const g = new THREE.Group();
    // Cluster of overlapping spheres for a fluffy look
    const puffs = [
      [0,    0,    0,    1.0],
      [1.8,  0.2,  0.1,  0.78],
      [-1.6, 0.18, 0,    0.72],
      [0.8,  0.5,  0.5,  0.62],
      [-0.6, 0.4, -0.4,  0.60],
      [2.8,  0.05, 0.3,  0.52],
      [-2.7, 0.05,-0.2,  0.50],
      [0.3,  0.7,  0,    0.48],
    ];
    puffs.forEach(([dx, dy, dz, r]) => {
      const puff = new THREE.Mesh(new THREE.SphereGeometry(r, 9, 6), cloudMat);
      puff.scale.set(2.1, 0.65, 1.1);
      puff.position.set(dx, dy, dz);
      g.add(puff);
    });
    g.scale.setScalar(scale);
    g.position.set(x, y, z);
    g.userData.speed = 0.006 + Math.random() * 0.008;
    g.userData.dir   = Math.random() > 0.5 ? 1 : -1;
    scene.add(g);
    cloudList.push(g);
  }

  // Spread clouds around the sky at various heights and distances
  const cloudDefs = [
    [ 60,  55, -90,  5.5], [-80,  60, -100, 6.0], [110,  50,  -60, 4.8],
    [-50,  48,  -70, 5.2], [ 30,  65,  -120, 7.0], [-100, 58,  -80, 5.8],
    [ 80,  52,   50, 4.5], [-70,  62,   60,  5.0], [  0,  58,  -110, 6.2],
    [ 50,  45,   80, 4.2], [-90,  50,   40,  5.5], [ 20,  70,  -140, 6.8],
    [-30,  55,  110, 5.0], [ 90,  60,  -30,  4.6], [-60,  65,  -50,  5.8],
    [  0,  42,   70, 3.8], [130,  55,   20,  5.2], [-120, 60,   10,  6.0],
    [ 40,  68, -150, 7.2], [-140, 52,  -20,  5.6],
  ];
  cloudDefs.forEach(([x, y, z, s]) => makeCloud(x, y, z, s));

  // Drift clouds slowly
  window.GAME.updaters.push(function() {
    cloudList.forEach(cl => {
      cl.position.x += cl.userData.speed * cl.userData.dir;
      // Wrap around when they drift too far
      if (cl.position.x >  200) cl.position.x = -200;
      if (cl.position.x < -200) cl.position.x =  200;
    });
  });
})();

// Rolling ground
(function buildGround() {
  const geo = new THREE.PlaneGeometry(200, 200, 120, 120);
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), z = pos.getY(i);
    pos.setZ(i, Math.sin(x*0.12)*0.6 + Math.cos(z*0.15)*0.5 + Math.sin((x+z)*0.08)*0.4);
  }
  geo.computeVertexNormals();
  geo.rotateX(-Math.PI / 2);
  const ground = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color: 0x3d8c3a }));
  ground.receiveShadow = true;
  scene.add(ground);
})();

// 🌙 Night Lighting
(function buildLights() {

  // Soft moonlight everywhere
  scene.add(new THREE.AmbientLight(0x6b7fb8, 0.35));

  // Main Moon Light
  const moon = new THREE.DirectionalLight(0xbfd8ff, 0.85);
  moon.position.set(70, 45, -110);   // Match the moon position
  moon.castShadow = true;

  moon.shadow.mapSize.set(IS_MOBILE ? 1024 : 2048, IS_MOBILE ? 1024 : 2048);

  moon.shadow.camera.near = 1;
  moon.shadow.camera.far = 250;

  moon.shadow.camera.left = -70;
  moon.shadow.camera.right = 70;
  moon.shadow.camera.top = 70;
  moon.shadow.camera.bottom = -70;

  moon.shadow.bias = -0.0003;

  scene.add(moon);

  // Very soft fill light so shadows aren't pitch black
  const fill = new THREE.DirectionalLight(0x3b5fa5, 0.18);
  fill.position.set(-40, 20, 20);
  scene.add(fill);

  // Night sky hemisphere
  scene.add(
    new THREE.HemisphereLight(
      0x223b66,   // Sky
      0x101018,   // Ground
      0.18
    )
  );

})();

// Render loop
(function animate() {
  requestAnimationFrame(animate);
  const delta   = window.GAME.clock.getDelta();      // MUST be first
  const elapsed = window.GAME.clock.getElapsedTime(); // reads accumulated time

  if (!window.playerReady) {
    camera.position.x = Math.sin(elapsed * 0.15) * 2;
    camera.lookAt(0, 1, 0);
  }

  window.GAME.updaters.forEach(fn => fn(elapsed, delta));
  renderer.render(scene, camera);
})();

// Keep camera aspect & renderer size in sync with the viewport
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Loading screen
(function() {
  const bar = document.getElementById('loading-bar');
  const screen = document.getElementById('loading-screen');
  const hud = document.getElementById('hud');
  let pct = 0;
  const tick = setInterval(() => {
    pct += Math.random() * 18;
    bar.style.width = Math.min(pct, 100) + '%';
    if (pct >= 100) {
      clearInterval(tick);
      setTimeout(() => {
        screen.style.opacity = '0';
        setTimeout(() => { screen.style.display = 'none'; hud.style.opacity = '1'; }, 1000);
      }, 400);
    }
  }, 120);
})();

console.log('[M1] Scene foundation ready');
</script>

<script>
/* ============================================================
   M2 — TERRAIN DETAILS
   Trees, flowers, grass tufts, dirt paths, boundary rocks
============================================================ */
(function buildTerrain() {
  const scene = window.GAME.scene;

  function groundY(x, z) {
    return Math.sin(x*0.12)*0.6 + Math.cos(z*0.15)*0.5 + Math.sin((x+z)*0.08)*0.4;
  }

  function seededRand(seed) {
    let s = seed;
    return function() { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  }
  const rand = seededRand(42);

  // =====================================
// Improved Walking Paths
// =====================================

const pathMat = new THREE.MeshLambertMaterial({
  color: 0xb8924f
});

const edgeMat = new THREE.MeshLambertMaterial({
  color: 0x8c6a38
});

[
  [-28,-28],   // Pizza
  [28,-28],    // Piercing
  [0,32]       // Stable
].forEach(([x2,z2]) => {

  const dx = x2;
  const dz = z2;
  const len = Math.sqrt(dx*dx + dz*dz);
  const angle = Math.atan2(dx, dz);

  // Main Path
  const path = new THREE.Mesh(
    new THREE.PlaneGeometry(2.8, len, 1, Math.ceil(len)),
    pathMat
  );

  path.rotation.y = angle;   // rotate around world Y first...
  path.rotateX(-Math.PI/2);  // ...then tilt flat in the now-rotated local frame
  path.position.set(x2/2, 0.02, z2/2);
  path.receiveShadow = true;
  scene.add(path);

  // Left Border
  const leftEdge = new THREE.Mesh(
    new THREE.PlaneGeometry(0.18, len),
    edgeMat
  );

  leftEdge.rotation.y = angle;
  leftEdge.rotateX(-Math.PI/2);
  leftEdge.position.set(x2/2, 0.025, z2/2);
  leftEdge.translateX(-1.45);

  scene.add(leftEdge);

  // Right Border
  const rightEdge = leftEdge.clone();
  rightEdge.translateX(2.9);
  scene.add(rightEdge);

});

// =============================
// Trees — instanced for performance
// =============================
// Every tree of a given type (oak/pine/cherry) shares the exact same
// local part layout — only world position, facing, per-tree scale, and
// (for deco) small random offsets differ. Instead of building ~700 real
// meshes across 45 trees, we collect transforms and draw everything
// through a couple dozen InstancedMesh calls.

const treePartDummy = new THREE.Object3D();
function treeLocalMat(px, py, pz, ry) {
  treePartDummy.position.set(px, py, pz);
  treePartDummy.rotation.set(0, ry || 0, 0);
  treePartDummy.updateMatrix();
  return treePartDummy.matrix.clone();
}

const treeBuckets = [];
function makeTreeBucket(geometry, color, castShadow) {
  const mat = new THREE.MeshLambertMaterial({ color });
  const bucket = { geometry, material: mat, castShadow: !!castShadow, entries: [] };
  treeBuckets.push(bucket);
  return bucket;
}

// Shared trunk — identical geometry/color across all tree types
const trunkGeo    = new THREE.CylinderGeometry(0.22, 0.28, 1.8, 8);
const trunkBucket = makeTreeBucket(trunkGeo, 0x6b4423, true);
const trunkLocal  = treeLocalMat(0, 0.9, 0);

// Oak leaf slots — (localX, localY, localZ, radius, color)
const oakLeafDefs = [
  [0, 2.3, 0, 1.2, 0x3b8d3b],
  [-0.6, 3.0, 0.2, 0.9, 0x4ca64c],
  [0.6, 3.0, -0.2, 0.9, 0x4ca64c],
  [0, 3.8, 0, 0.8, 0x5fbf5f],
];
const oakGeoCache = {}, oakBucketByKey = {};
oakLeafDefs.forEach(([lx, ly, lz, r, c]) => {
  const key = r + ':' + c;
  if (!oakBucketByKey[key]) {
    if (!oakGeoCache[r]) oakGeoCache[r] = new THREE.SphereGeometry(r, 10, 10);
    oakBucketByKey[key] = makeTreeBucket(oakGeoCache[r], c, false);
  }
});
const oakLeafSlots = oakLeafDefs.map(([lx, ly, lz, r, c]) => ({
  bucket: oakBucketByKey[r + ':' + c],
  local: treeLocalMat(lx, ly, lz, 0),
}));

// Pine cone slots — (radius, height, localY, color)
const pineConeDefs = [
  [1.2, 1.5, 2.0, 0x2d6e38],
  [0.95, 1.3, 3.0, 0x3d8a45],
  [0.7, 1.2, 3.8, 0x4ca64c],
];
const pineConeSlots = pineConeDefs.map(([r, h, y, c]) => ({
  bucket: makeTreeBucket(new THREE.ConeGeometry(r, h, 8), c, false),
  local: treeLocalMat(0, y, 0),
}));

// Cherry blossom slots — (localX, localY, localZ, radius), shared color
const cherryBlossomDefs = [
  [0, 2.5, 0, 1.2],
  [-0.6, 3.2, 0.2, 0.9],
  [0.6, 3.2, -0.2, 0.9],
  [0, 4.0, 0, 0.75],
];
const cherryBucketByR = {};
cherryBlossomDefs.forEach(([lx, ly, lz, r]) => {
  if (!cherryBucketByR[r]) {
    cherryBucketByR[r] = makeTreeBucket(new THREE.SphereGeometry(r, 10, 10), 0xffb6d9, true);
  }
});
const cherryBlossomSlots = cherryBlossomDefs.map(([lx, ly, lz, r]) => ({
  bucket: cherryBucketByR[r],
  local: treeLocalMat(lx, ly, lz, 0),
}));

// ── Ground decoration buckets — NOT affected by tree scale (matches original) ──
const decoGrassGeo    = new THREE.BoxGeometry(0.05, 1, 0.05); // unit height, scaled per-instance
const decoGrassBucket = makeTreeBucket(decoGrassGeo, 0x3f8f3f, false);

const decoFlowerColors  = [0xff69b4, 0xffffff, 0xffeb3b, 0xb388ff];
const decoFlowerGeo     = new THREE.SphereGeometry(0.07, 6, 6);
const decoFlowerBuckets = decoFlowerColors.map(c => makeTreeBucket(decoFlowerGeo, c, false));

const mushroomStemGeo    = new THREE.CylinderGeometry(0.03, 0.03, 0.12, 6);
const mushroomStemBucket = makeTreeBucket(mushroomStemGeo, 0xf5e6c8, false);
const mushroomCapGeo     = new THREE.SphereGeometry(0.08, 8, 8);
mushroomCapGeo.scale(1, 0.5, 1);
const mushroomCapBucket  = makeTreeBucket(mushroomCapGeo, 0xd63b3b, false);

const rockGeo    = new THREE.DodecahedronGeometry(0.12, 0);
const rockBucket = makeTreeBucket(rockGeo, 0x888888, false);

// rand() call order/count below matches the original makeTree exactly
// (type, rotation, grass x6, flowers x3, mushroom, rock) so every
// downstream random placement is completely unaffected by this refactor.
function addTree(x, z, scale) {
  const type = Math.floor(rand() * 3);
  const treeY = groundY(x, z);
  const rotY  = rand() * Math.PI * 2;

  // Parent transform for trunk/foliage — position + rotation + tree scale
  const parentDummy = new THREE.Object3D();
  parentDummy.position.set(x, treeY, z);
  parentDummy.rotation.set(0, rotY, 0);
  parentDummy.scale.set(scale, scale, scale);
  parentDummy.updateMatrix();
  const scaledParent = parentDummy.matrix;

  const finalMat = new THREE.Matrix4();
  finalMat.multiplyMatrices(scaledParent, trunkLocal);
  trunkBucket.entries.push(finalMat.clone());

  const slots = type === 0 ? oakLeafSlots : type === 1 ? pineConeSlots : cherryBlossomSlots;
  slots.forEach(slot => {
    finalMat.multiplyMatrices(scaledParent, slot.local);
    slot.bucket.entries.push(finalMat.clone());
  });

  // Parent transform for deco — position + rotation only, NO scale (matches original)
  const decoParentDummy = new THREE.Object3D();
  decoParentDummy.position.set(x, treeY, z);
  decoParentDummy.rotation.set(0, rotY, 0);
  decoParentDummy.updateMatrix();
  const decoParent = decoParentDummy.matrix;

  // Tall grass — 6 blades
  const localDummy = new THREE.Object3D();
  for (let i = 0; i < 6; i++) {
    const h = 0.35 + rand() * 0.2;
    const a = rand() * Math.PI * 2;
    const r = 0.8 + rand() * 0.7;
    localDummy.position.set(Math.cos(a) * r, 0.18, Math.sin(a) * r);
    localDummy.rotation.set(0, 0, 0);
    localDummy.scale.set(1, h, 1);
    localDummy.updateMatrix();
    finalMat.multiplyMatrices(decoParent, localDummy.matrix);
    decoGrassBucket.entries.push(finalMat.clone());
  }

  // Flowers — 3
  for (let i = 0; i < 3; i++) {
    const colorIdx = Math.floor(rand() * 4);
    const a = rand() * Math.PI * 2;
    const r = 0.5 + rand() * 0.8;
    const local = treeLocalMat(Math.cos(a) * r, 0.22, Math.sin(a) * r, 0);
    finalMat.multiplyMatrices(decoParent, local);
    decoFlowerBuckets[colorIdx].entries.push(finalMat.clone());
  }

  // Mushroom
  if (rand() > 0.45) {
    const mx = (rand() - 0.5) * 1.2;
    const mz = (rand() - 0.5) * 1.2;
    finalMat.multiplyMatrices(decoParent, treeLocalMat(mx, 0.06, mz, 0));
    mushroomStemBucket.entries.push(finalMat.clone());
    finalMat.multiplyMatrices(decoParent, treeLocalMat(mx, 0.14, mz, 0));
    mushroomCapBucket.entries.push(finalMat.clone());
  }

  // Small rock
  if (rand() > 0.55) {
    const rx = (rand() - 0.5);
    const rz = (rand() - 0.5);
    const rrot = rand() * Math.PI;
    finalMat.multiplyMatrices(decoParent, treeLocalMat(rx, 0.08, rz, rrot));
    rockBucket.entries.push(finalMat.clone());
  }
}

// =============================
// Forest Layout
// =============================

const treeLocations = [

  // ---------- Northwest ----------
  [-48,-30],[-45,-20],[-43,-10],[-40,0],[-42,12],[-38,22],[-46,30],

  // ---------- Northeast ----------
  [48,-30],[45,-20],[43,-10],[40,0],[42,12],[38,22],[46,30],

  // ---------- South ----------
  [-28,-46],[-18,-42],[-8,-45],[8,-45],[18,-42],[28,-46],

  // ---------- North ----------
  [-26,46],[-16,42],[-6,45],[6,45],[16,42],[26,46],

  // ---------- Stable Area ----------
  [-14,24],[-8,28],[8,28],[14,24],

  // ---------- Pizza Area ----------
  [-42,-42],[-34,-36],[-30,-46],

  // ---------- Piercing Area ----------
  [42,-42],[34,-36],[30,-46],

  // ---------- Random Fill ----------

treeLocations.forEach(([x,z]) => {

});

// Build one InstancedMesh per non-empty bucket
treeBuckets.forEach(bucket => {
  if (!bucket.entries.length) return;
  const mesh = new THREE.InstancedMesh(bucket.geometry, bucket.material, bucket.entries.length);
  mesh.castShadow = bucket.castShadow;

  mesh.instanceMatrix.needsUpdate = true;

});

  // ── Realistic Grass Tufts — instanced for performance ──────
  // Every blade across all 420 tufts shares one unit PlaneGeometry.
  // Instead of ~5,500 individual THREE.Mesh draw calls, all blades of
  // the same shade are drawn together via a single InstancedMesh —
  // same look, same per-tuft wind sway, far fewer draw calls.
  const grassShadeColors = [0x2d7a1f, 0x3a9426, 0x4db030, 0x56c23a, 0x6dcc44, 0x8fce5a, 0xb5e878];
  const unitBladeGeo = new THREE.PlaneGeometry(1, 1);

  const tuftDefs = [];                                   // { baseX, baseZ, baseY, phase, speed }
  const bladesByColor = grassShadeColors.map(() => []);  // per shade: { tuftIdx, matrix }
  const baseCircles = [];                                 // { tuftIdx, radius, segments, color }
  const bladeDummy = new THREE.Object3D();

  function addBlade(tuftIdx, colorIdx, x, y, z, w, h, rotY, rotZ) {
    bladeDummy.position.set(x, y, z);
    bladeDummy.rotation.set(0, rotY, rotZ);
    bladeDummy.scale.set(w, h, 1);
    bladeDummy.updateMatrix();
    bladesByColor[colorIdx].push({ tuftIdx, matrix: bladeDummy.matrix.clone() });
  }

  // Type A — thin tall sparse blades
  function makeGrassTuftA(x, z) {
    const tuftIdx = tuftDefs.length;
    const count = 5 + Math.floor(rand() * 4);
    for (let j = 0; j < count; j++) {
      const h = 0.45 + rand() * 0.55;
      const w = 0.04 + rand() * 0.03;
      const rotY = (j / count) * Math.PI * 2 + rand() * 0.6;
      const rotZ = (rand() - 0.5) * 0.8;
      addBlade(tuftIdx, Math.floor(rand() * 4), (rand()-0.5)*0.15, h/2, (rand()-0.5)*0.15, w, h, rotY, rotZ);
    }
    tuftDefs.push({ baseX: x, baseZ: z, baseY: groundY(x,z), phase: rand()*Math.PI*2, speed: 0.5+rand()*0.5 });
  }

  // Type B — short dense clump
  function makeGrassTuftB(x, z) {
    const tuftIdx = tuftDefs.length;
    const count = 10 + Math.floor(rand() * 6);
    for (let j = 0; j < count; j++) {
      const h = 0.18 + rand() * 0.22;
      const w = 0.05 + rand() * 0.04;
      const rotY = rand() * Math.PI * 2;
      const rotZ = (rand() - 0.5) * 0.5;
      addBlade(tuftIdx, Math.floor(rand() * grassShadeColors.length), (rand()-0.5)*0.28, h/2, (rand()-0.5)*0.28, w, h, rotY, rotZ);
    }
    baseCircles.push({ tuftIdx, radius: 0.2, segments: 6, color: 0x1e5c14 });
    tuftDefs.push({ baseX: x, baseZ: z, baseY: groundY(x,z), phase: rand()*Math.PI*2, speed: 0.4+rand()*0.4 });
  }

  // Type C — wide spreading patch with height gradient (light tips)
  function makeGrassTuftC(x, z) {
    const tuftIdx = tuftDefs.length;
    const count = 14 + Math.floor(rand() * 8);
    for (let j = 0; j < count; j++) {
      const h = 0.25 + rand() * 0.4;
      const shadeIdx = Math.min(Math.floor((h / 0.65) * 5) + 2, grassShadeColors.length-1);
      const rotY = rand() * Math.PI * 2;
      const rotZ = (rand() - 0.5) * 0.6;
      addBlade(tuftIdx, shadeIdx, (rand()-0.5)*0.38, h/2, (rand()-0.5)*0.38, 0.05, h, rotY, rotZ);
    }
    baseCircles.push({ tuftIdx, radius: 0.28, segments: 7, color: 0x235e14 });
    tuftDefs.push({ baseX: x, baseZ: z, baseY: groundY(x,z), phase: rand()*Math.PI*2, speed: 0.35+rand()*0.35 });
  }

  // Mix all three types
  const tuftFns = [makeGrassTuftA, makeGrassTuftB, makeGrassTuftC];
  for (let i = 0; i < 420; i++) {
    const a = rand()*Math.PI*2, r = 2 + rand()*50;
    const x = Math.cos(a)*r, z = Math.sin(a)*r;
    tuftFns[Math.floor(rand()*3)](x, z);
  }

  // Build one InstancedMesh per grass shade holding every blade of that color
  const grassBladeMeshes = []; // { mesh, entries: [{tuftIdx, matrix}] }
  bladesByColor.forEach((entries, colorIdx) => {
    if (!entries.length) return;
    const mat = new THREE.MeshLambertMaterial({ color: grassShadeColors[colorIdx], side: THREE.DoubleSide });
    const mesh = new THREE.InstancedMesh(unitBladeGeo, mat, entries.length);
    mesh.castShadow = false;
    mesh.receiveShadow = false;
    mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    entries.forEach((e, i) => mesh.setMatrixAt(i, e.matrix));
    mesh.instanceMatrix.needsUpdate = true;
    scene.add(mesh);
    grassBladeMeshes.push({ mesh, entries });
  });

  // Base circles under dense/wide tufts — static, grouped by color into InstancedMeshes
  const circlesByColor = {};
  baseCircles.forEach(c => {
    if (!circlesByColor[c.color]) circlesByColor[c.color] = { radius: c.radius, segments: c.segments, items: [] };
    circlesByColor[c.color].items.push(c);
  });
  Object.entries(circlesByColor).forEach(([colorHex, group]) => {
    const geo = new THREE.CircleGeometry(group.radius, group.segments);
    const mat = new THREE.MeshLambertMaterial({ color: Number(colorHex) });
    const mesh = new THREE.InstancedMesh(geo, mat, group.items.length);
    mesh.castShadow = false;
    mesh.receiveShadow = false;
    const d = new THREE.Object3D();
    group.items.forEach((c, i) => {
      const t = tuftDefs[c.tuftIdx];
      d.position.set(t.baseX, t.baseY + 0.01, t.baseZ);
      d.rotation.set(-Math.PI/2, 0, 0);
      d.updateMatrix();
      mesh.setMatrixAt(i, d.matrix);
    });
    mesh.instanceMatrix.needsUpdate = true;
    scene.add(mesh);
  });

  // ── Tulips + Lilies — instanced for performance ────────────
  // Same trick as the grass: every tulip/lily is built from fixed-shape
  // "parts" (stem, leaves, petals...) at fixed local offsets — only
  // position, facing, sway timing, and color vary per flower. Instead of
  // ~1,340 individual meshes, everything draws through ~26 InstancedMesh
  // calls, bucketed by color where color varies (petals/inner cup).
  const tulipColors = [0xff1744, 0xff4081, 0xf50057, 0xff6d00, 0xaa00ff, 0xffd600, 0xffffff];
  const lilyColors  = [0xff80ab, 0xce93d8, 0xfff9c4, 0xffcc80, 0xb2dfdb, 0xf48fb1];

  const flowerDefs = []; // { baseX, baseZ, baseY, baseRotY, phase, speed }
  const partDummy  = new THREE.Object3D();
  function localMat(px, py, pz, rx, ry, rz) {
    partDummy.position.set(px, py, pz);
    partDummy.rotation.set(rx, ry, rz);
    partDummy.updateMatrix();
    return partDummy.matrix.clone();
  }

  const flowerBuckets = [];
  function makeBucket(geometry, color, opts) {
    const mat = new THREE.MeshLambertMaterial(Object.assign({ color }, opts || {}));
    const bucket = { geometry, material: mat, entries: [] };
    flowerBuckets.push(bucket);
    return bucket;
  }

  // ── Tulip part templates (fixed local shape, same for every tulip) ──
  const tulipStemGeo = new THREE.CylinderGeometry(0.025, 0.035, 0.7, 6);
  const tulipLeafGeo = new THREE.CylinderGeometry(0.01, 0.06, 0.35, 5);
  const tulipPetalGeo = new THREE.SphereGeometry(0.1, 6, 7);
  tulipPetalGeo.scale(0.55, 1.2, 0.55);
  const tulipInnerGeo = new THREE.SphereGeometry(0.09, 7, 7);
  tulipInnerGeo.scale(1, 0.9, 1);

  const tulipStemBucket   = makeBucket(tulipStemGeo, 0x2e7d32);
  const tulipLeafBucket   = makeBucket(tulipLeafGeo, 0x388e3c);
  const tulipPetalBuckets = tulipColors.map(c => makeBucket(tulipPetalGeo, c));
  const tulipInnerBuckets = tulipColors.map(c => makeBucket(tulipInnerGeo, new THREE.Color(c).multiplyScalar(0.7)));

  const tulipStemLocal   = localMat(0, 0.35, 0, 0, 0, 0);
  const tulipLeafLocals  = [-1, 1].map(side => localMat(side*0.1, 0.3, 0, 0.3, 0, side*0.6));
  const tulipInnerLocal  = localMat(0, 0.72, 0, 0, 0, 0);
  const tulipPetalLocals = [];
  for (let i = 0; i < 6; i++) {
    const angle = (i/6) * Math.PI * 2;
    tulipPetalLocals.push(localMat(Math.cos(angle)*0.09, 0.76, Math.sin(angle)*0.09, -0.25, angle, Math.cos(angle)*0.2));
  }

  // ── Lily part templates ──────────────────────────────────────────
  const lilyStemGeo   = new THREE.CylinderGeometry(0.02, 0.03, 0.6, 6);
  const lilyLeafGeo   = new THREE.CylinderGeometry(0.005, 0.04, 0.5, 5);
  const lilyPetalGeo  = new THREE.CylinderGeometry(0.01, 0.08, 0.36, 5);
  const lilyStamenGeo = new THREE.CylinderGeometry(0.008, 0.008, 0.22, 4);
  const lilyAntherGeo = new THREE.SphereGeometry(0.016, 4, 4);

  const lilyStemBucket   = makeBucket(lilyStemGeo, 0x1b5e20);
  const lilyLeafBucket   = makeBucket(lilyLeafGeo, 0x2e7d32);
  const lilyPetalBuckets = lilyColors.map(c => makeBucket(lilyPetalGeo, c, { side: THREE.DoubleSide }));
  const lilyStamenBucket = makeBucket(lilyStamenGeo, 0xffd600);
  const lilyAntherBucket = makeBucket(lilyAntherGeo, 0xff6f00);

  const lilyStemLocal  = localMat(0, 0.3, 0, 0, 0, 0);
  const lilyLeafLocals = [-1, 1].map(side => localMat(side*0.12, 0.22, 0.05, -0.2, 0, side*0.8));
  const lilyPetalLocals = [], lilyStamenLocals = [], lilyAntherLocals = [];
  for (let i = 0; i < 6; i++) {
    const angle = (i/6) * Math.PI * 2;
    lilyPetalLocals.push(localMat(Math.cos(angle)*0.14, 0.65, Math.sin(angle)*0.14, -Math.sin(angle)*0.9, angle, Math.cos(angle)*0.9));
    lilyStamenLocals.push(localMat(Math.cos(angle)*0.04, 0.69, Math.sin(angle)*0.04, -Math.sin(angle)*0.4, 0, Math.cos(angle)*0.4));
    lilyAntherLocals.push(localMat(Math.cos(angle)*0.06, 0.78, Math.sin(angle)*0.06, 0, 0, 0));
  }

  // rand() call order/count per flower matches the original makeTulip/makeLily
  // exactly (rotation.y, then phase, then speed) so every downstream random
  // placement (rocks, etc.) is completely unaffected by this refactor.
  function addFlower(type, x, z, color) {
    const flowerIdx = flowerDefs.length;
    flowerDefs.push({
      baseX: x, baseZ: z, baseY: groundY(x, z),
      baseRotY: rand() * Math.PI * 2,
      phase: rand() * Math.PI * 2,
      speed: type === 'tulip' ? (0.3 + rand()*0.4) : (0.25 + rand()*0.35),
    });

    if (type === 'tulip') {
      const colorIdx = tulipColors.indexOf(color);
      tulipStemBucket.entries.push({ flowerIdx, matrix: tulipStemLocal });
      tulipLeafLocals.forEach(m => tulipLeafBucket.entries.push({ flowerIdx, matrix: m }));
      tulipPetalLocals.forEach(m => tulipPetalBuckets[colorIdx].entries.push({ flowerIdx, matrix: m }));
      tulipInnerBuckets[colorIdx].entries.push({ flowerIdx, matrix: tulipInnerLocal });
    } else {
      const colorIdx = lilyColors.indexOf(color);
      lilyStemBucket.entries.push({ flowerIdx, matrix: lilyStemLocal });
      lilyLeafLocals.forEach(m => lilyLeafBucket.entries.push({ flowerIdx, matrix: m }));
      lilyPetalLocals.forEach(m => lilyPetalBuckets[colorIdx].entries.push({ flowerIdx, matrix: m }));
      lilyStamenLocals.forEach(m => lilyStamenBucket.entries.push({ flowerIdx, matrix: m }));
      lilyAntherLocals.forEach(m => lilyAntherBucket.entries.push({ flowerIdx, matrix: m }));
    }
  }

  // ── Place flowers across the meadow ───────────────────────
  const CLEAR_ZONES = [
    [0, 0, 7],         // fountain center
    [-28, -28, 8],     // pizza
    [28, -28, 8],      // piercing
    [0, 32, 8],        // stable
  ];

  function isClear(x, z) {
    return CLEAR_ZONES.every(([cx, cz, r]) => Math.sqrt((x-cx)**2 + (z-cz)**2) > r);
  }

  // Tulips — 50 of them in clusters
  for (let i = 0; i < 50; i++) {
    const a = rand() * Math.PI * 2;
    const r = 4 + rand() * 44;
    const x = Math.cos(a) * r, z = Math.sin(a) * r;
    if (!isClear(x, z)) continue;
    const color = tulipColors[Math.floor(rand() * tulipColors.length)];
    addFlower('tulip', x, z, color);
  }

  // Lilies — 40 of them spread around
  for (let i = 0; i < 40; i++) {
    const a = rand() * Math.PI * 2;
    const r = 4 + rand() * 44;
    const x = Math.cos(a) * r, z = Math.sin(a) * r;
    if (!isClear(x, z)) continue;
    const color = lilyColors[Math.floor(rand() * lilyColors.length)];
    addFlower('lily', x, z, color);
  }

  // Build one InstancedMesh per bucket
  flowerBuckets.forEach(bucket => {
    if (!bucket.entries.length) return;
    const mesh = new THREE.InstancedMesh(bucket.geometry, bucket.material, bucket.entries.length);
    mesh.castShadow = false;
    mesh.receiveShadow = false;
    mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    bucket.entries.forEach((e, i) => mesh.setMatrixAt(i, e.matrix));
    mesh.instanceMatrix.needsUpdate = true;
    scene.add(mesh);
    bucket.mesh = mesh;
  });

  // ── Gentle sway animation for all flowers + grass ─────────
  const grassSwayDummy = new THREE.Object3D();
  const grassFinalMat = new THREE.Matrix4();

  window.GAME.updaters.push(function(elapsed) {
    // Flowers: recompute each flower's rigid sway rotation once, reuse
    // it for every part belonging to that flower.
    const flowerMatrices = flowerDefs.map(f => {
      const sway = Math.sin(elapsed * f.speed + f.phase) * 0.055;
      grassSwayDummy.position.set(f.baseX, f.baseY, f.baseZ);
      grassSwayDummy.rotation.set(0, f.baseRotY, sway);
      grassSwayDummy.updateMatrix();
      return grassSwayDummy.matrix.clone();
    });
    flowerBuckets.forEach(bucket => {
      if (!bucket.mesh) return;
      bucket.entries.forEach((e, i) => {
        grassFinalMat.multiplyMatrices(flowerMatrices[e.flowerIdx], e.matrix);
        bucket.mesh.setMatrixAt(i, grassFinalMat);
      });
      bucket.mesh.instanceMatrix.needsUpdate = true;
    });

    // Recompute each tuft's rigid sway rotation once, then reuse it for
    // every blade in that tuft — a handful of matrix multiplies instead
    // of thousands of separate per-mesh rotation updates + draw calls.
    const tuftMatrices = tuftDefs.map(t => {
      const sway = Math.sin(elapsed * t.speed + t.phase) * 0.08;
      grassSwayDummy.position.set(t.baseX, t.baseY, t.baseZ);
      grassSwayDummy.rotation.set(0, 0, sway);
      grassSwayDummy.updateMatrix();
      return grassSwayDummy.matrix.clone();
    });

    grassBladeMeshes.forEach(({ mesh, entries }) => {
      entries.forEach((e, i) => {
        grassFinalMat.multiplyMatrices(tuftMatrices[e.tuftIdx], e.matrix);
        mesh.setMatrixAt(i, grassFinalMat);
      });
      mesh.instanceMatrix.needsUpdate = true;
    });
  });

  // Boundary rocks
  for (let i=0; i<30; i++) {
    const a=(i/30)*Math.PI*2, r=52+rand()*4;
    const x=Math.cos(a)*r, z=Math.sin(a)*r;
    const m = new THREE.Mesh(
      new THREE.DodecahedronGeometry(0.5+rand()*0.6, 0),
      new THREE.MeshLambertMaterial({ color: 0x8d8d7a })
    );
    m.castShadow = false;
    m.position.set(x, groundY(x,z)+0.3, z);
    m.rotation.set(rand()*2, rand()*2, rand()*2);
    scene.add(m);
  }

  // ── Bushes — small, natural, varied ──────────────────────
  function makeBush(x, z, scale) {
    const g = new THREE.Group();
    // Keep scale small — max 0.55
    const s = Math.min(scale, 0.55);
    const baseColors = [0x2d6e2d, 0x357a35, 0x3d8c3d, 0x2a5e2a];
    const tipColors  = [0x4db030, 0x5ec93a, 0x6dcc44, 0x45a030];

    // 3-4 spheres only — no more giant clusters
    const puffs = [
      [0,    0,    0.9],
      [s*0.6, s*0.15, 0.65],
      [-s*0.55, s*0.12, 0.62],
      [s*0.1, s*0.3, 0.5],
    ];
    puffs.forEach(([dx, dy, dr], i) => {
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(dr * s, 6, 5),
        new THREE.MeshLambertMaterial({ color: i === 0 ? baseColors[Math.floor(rand()*baseColors.length)] : tipColors[Math.floor(rand()*tipColors.length)] })
      );
      mesh.position.set(dx, dy + s*0.45, 0);
      mesh.castShadow = false;
      mesh.receiveShadow = false;
      g.add(mesh);
    });

    // 2-3 tiny flower dots max
    const flCount = Math.floor(rand()*3);
    for (let i = 0; i < flCount; i++) {
      const a = rand()*Math.PI*2;
      const dot = new THREE.Mesh(new THREE.SphereGeometry(0.04, 4, 3),
        new THREE.MeshLambertMaterial({ color: [0xff85c1,0xffffff,0xffeb3b][Math.floor(rand()*3)] }));
      dot.position.set(Math.cos(a)*s*0.6, s*0.85, Math.sin(a)*s*0.3);
      dot.castShadow = false;
      dot.receiveShadow = false;
      g.add(dot);
    }

    g.position.set(x, groundY(x,z), z);
    g.rotation.y = rand()*Math.PI*2;
    scene.add(g);
  }

  // Fewer bushes, kept small (scale 0.25–0.5)
  for (let i = 0; i < 30; i++) {
    const a = rand()*Math.PI*2, r = 6 + rand()*44;
    const x = Math.cos(a)*r, z = Math.sin(a)*r;
    if (!isClear(x, z)) continue;
    makeBush(x, z, 0.25 + rand()*0.28);
  }

  // ── Extra scattered rocks ─────────────────────────────────
  const rockColors = [0x8d8d7a, 0x9e9e8a, 0x7a7a6a, 0xb0a890];
  for (let i = 0; i < 35; i++) {
    const a = rand()*Math.PI*2, r = 4 + rand()*46;
    const x = Math.cos(a)*r, z = Math.sin(a)*r;
    const size = 0.15 + rand()*0.45;
    const rock = new THREE.Mesh(
      new THREE.DodecahedronGeometry(size, 0),
      new THREE.MeshLambertMaterial({ color: rockColors[Math.floor(rand()*rockColors.length)] })
    );
    rock.position.set(x, groundY(x,z) + size*0.4, z);
    rock.rotation.set(rand()*3, rand()*3, rand()*3);
    rock.castShadow = false;
    rock.receiveShadow = false;
    scene.add(rock);
  }

// ── Fireflies ──────────────────────────────────────────────
const butterflies = [];

function makeButterfly(x, y, z) {

  const g = new THREE.Group();

  // Glowing core
  const glow = new THREE.Mesh(
    new THREE.SphereGeometry(0.08, 8, 8),
    new THREE.MeshBasicMaterial({
      color: 0xfff7a0,
      transparent: true,
      opacity: 1
    })
  );
  glow.castShadow = false;
  glow.receiveShadow = false;

  g.add(glow);

  // Soft glow halo
  const halo = new THREE.Mesh(
    new THREE.SphereGeometry(0.18, 10, 10),
    new THREE.MeshBasicMaterial({
      color: 0xfff0a0,
      transparent: true,
      opacity: 0.25,
      depthWrite: false
    })
  );
  halo.castShadow = false;
  halo.receiveShadow = false;

  g.add(halo);

  g.position.set(x, y, z);

  g.userData.centerX = x;
  g.userData.centerZ = z;
  g.userData.baseY = y;

  g.userData.phase = rand() * Math.PI * 2;
  g.userData.speed = 0.25 + rand() * 0.35;
  g.userData.radius = 1 + rand() * 2;
  g.userData.blink = rand() * Math.PI * 2;

  scene.add(g);

  butterflies.push(g);

}

for (let i = 0; i < 45; i++) {

  const a = rand() * Math.PI * 2;
  const r = 5 + rand() * 35;

  makeButterfly(
    Math.cos(a) * r,
    0.7 + rand() * 1.8,
    Math.sin(a) * r
  );

}

  // ── Birds (simple V-shape silhouettes gliding high) ───────
  const birds = [];
  function makeBird(x, y, z) {
    const g = new THREE.Group();
    const mat = new THREE.MeshLambertMaterial({ color: 0x2c2c2c, side: THREE.DoubleSide });
    // Two curved wings
    [-1,1].forEach(side => {
      const wing = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.12), mat);
      wing.position.set(side*0.28, 0, 0);
      wing.rotation.z = side * 0.3;
      wing.rotation.y = side * 0.15;
      wing.castShadow = false;
      wing.receiveShadow = false;
      g.add(wing);
    });
    g.position.set(x, y, z);
    g.userData.phase  = rand()*Math.PI*2;
    g.userData.speed  = 0.15 + rand()*0.1;
    g.userData.radius = 20 + rand()*25;
    g.userData.baseY  = y;
    g.userData.wingPhase = rand()*Math.PI*2;

      if (isTulip) {

        for (let i = 0; i < 6; i++) {

          const p = new THREE.Mesh(new THREE.SphereGeometry(0.1, 5, 5), petalMat);

          p.position.set(Math.cos(a)*0.09, stemH+0.1, Math.sin(a)*0.09);
          p.rotation.x = -0.2; p.rotation.y = a;
          p.castShadow = false;
          p.receiveShadow = false;
          g.add(p);
        }
        const center = new THREE.Mesh(new THREE.SphereGeometry(0.075, 5, 5),

        center.position.y = stemH + 0.06;

        center.receiveShadow = false;

        const layers = [3, 5, 8];

          const r    = 0.05 + li * 0.07;
          const yOff = stemH + 0.2 - li * 0.06;

            const p = new THREE.Mesh(new THREE.SphereGeometry(0.09, 5, 4),

            p.position.set(Math.cos(a)*r, yOff, Math.sin(a)*r);

        bud.castShadow = false;
        bud.receiveShadow = false;

        fadeAt:  performance.now() / 1000 + FADE_TIME * 0.7,
      });

      // Remove oldest if over limit
      if (trailFlowers.length > MAX) {
        const old = trailFlowers.shift();
        scene.remove(old.mesh);

    }

    window.GAME.updaters.push(function(elapsed) {
      if (!window.GAME.player) return;
      const p  = window.GAME.player;
      const dx = p.position.x - lastX;
      const dz = p.position.z - lastZ;
      const moved = Math.sqrt(dx*dx + dz*dz);

      // Spawn when moved far enough
      if (moved > SPAWN_DIST) {
        const count = 2 + Math.floor(Math.random() * 2);
        for (let f = 0; f < count; f++) spawnTrailFlower(lastX, lastZ);
        lastX = p.position.x;
        lastZ = p.position.z;
        lastSpawn = elapsed;
      }

      // Animate: bloom up then fade out
      const now = performance.now() / 1000;
      for (let i = trailFlowers.length - 1; i >= 0; i--) {
        const f    = trailFlowers[i];
        const age  = now - f.born;
        const life = age / FADE_TIME;

        if (life < 0.18) {
          // Bloom in — scale up quickly with a little overshoot
          const t = life / 0.18;
          const s = t < 0.8 ? t * 1.25 : 1 + (1-t)*0.25;
          f.mesh.scale.setScalar(Math.min(s, 1.0));
        } else if (life < 0.75) {
          // Hold full size, gentle sway
          f.mesh.scale.setScalar(1.0);
          f.mesh.rotation.z = Math.sin(elapsed*2 + i)*0.06;
        } else if (life < 1.0) {
          // Fade out — shrink and lower
          const t = (life - 0.75) / 0.25;
          const s = 1.0 - t;
          f.mesh.scale.setScalar(Math.max(s, 0));
          f.mesh.position.y -= 0.012;
          if (s <= 0.05) {
            scene.remove(f.mesh);
            trailFlowers.splice(i, 1);
          }
        }
      }
    });
  })();

  console.log('[M3] Mana is ready ✿');
})();

    g.add(trimTop);
    const trimBot = new THREE.Mesh(new THREE.BoxGeometry(3.32, 0.12, 0.24), trimMat);
    trimBot.position.set(0, 1.69, 0);
    trimBot.castShadow = false;
    trimBot.receiveShadow = false;
    g.add(trimBot);
    const trimL = new THREE.Mesh(new THREE.BoxGeometry(0.12, 1.0, 0.24), trimMat);
    trimL.position.set(-1.68, 2.2, 0);

    trimL.receiveShadow = false;
    g.add(trimL);
    const trimR = trimL.clone();
    trimR.position.set(1.68, 2.2, 0);
    trimR.castShadow = false;
    trimR.receiveShadow = false;
    g.add(trimR);

    // Gold studs
    [[-1.62,2.68],[1.62,2.68],[-1.62,1.72],[1.62,1.72]].forEach(([sx,sy]) => {
      const stud = new THREE.Mesh(new THREE.SphereGeometry(0.08, 6, 5),
        new THREE.MeshLambertMaterial({ color: 0xffd700 }));
      stud.position.set(sx, sy, 0.14);
      stud.castShadow = false;
      stud.receiveShadow = false;
      g.add(stud);
    });

    // Text plane — baked into canvas, fixed geometry
    const cv = document.createElement('canvas');
    cv.width = 512; cv.height = 128;
    const ctx = cv.getContext('2d');
    ctx.fillStyle = '#c8965a';
    ctx.fillRect(0, 0, 512, 128);
    // Wood grain
    ctx.strokeStyle = 'rgba(140,90,30,0.4)';
    ctx.lineWidth = 2;
    for (let i = 0; i < 4; i++) {
      ctx.beginPath(); ctx.moveTo(0, 20+i*30); ctx.lineTo(512, 22+i*30); ctx.stroke();
    }
    // Bold text — sized to fit within board
    ctx.fillStyle = '#2a0d00';
    ctx.font = 'bold 48px "Arial Black", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 4;
    ctx.shadowOffsetY = 3;
    // Measure and scale down if too wide
    let fontSize = 48;
    while (ctx.measureText(text).width > 460 && fontSize > 20) {
      fontSize -= 4;
      ctx.font = `bold ${fontSize}px "Arial Black", Arial, sans-serif`;
    }
    ctx.fillText(text, 256, 64);

    // Plane matches canvas aspect: 512/128 = 4:1, so width=3.0 height=0.75
    const plane = new THREE.Mesh(
      new THREE.PlaneGeometry(3.0, 0.75),
      new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(cv), transparent: false, side: THREE.DoubleSide })
    );
    plane.position.set(0, 2.2, 0.12);
    g.add(plane);

    // Place in world
    g.position.set(worldX, gy, worldZ);
    g.rotation.y = rotY;
    scene.add(g);
    return g;
  }

    });

    horseUI.style.display = 'flex';

  }

  let activeZone = null;

  // Expose zones globally so we can debug from console
  window.GAME.zones = zones;
  window.GAME.activeZone = null;

  // Shared interact action — used by the E key and by the mobile interact button (M6)
  window.GAME.interact = function() {
    if (window.GAME.uiOpen) return;
    if (window.GAME.activeZone) window.GAME.activeZone.onInteract();
    else if (window.GAME.nearChest) window.GAME.openChest(window.GAME.nearChest);

  window.addEventListener('keydown', e => {

    const px = window.GAME.player.position.x;
    const pz = window.GAME.player.position.z;

    let found = null;
    let nearest = Infinity;
    zones.forEach(zone => {
      const d = Math.sqrt((px - zone.x)**2 + (pz - zone.z)**2);
      if (d < zone.radius && d < nearest) { nearest = d; found = zone; }
    });

    window.GAME.activeZone = found;

    if (found) {
      prompt.textContent = found.label;
      prompt.style.opacity = '1';
    } else if (window.GAME.nearChest) {
      prompt.textContent = `🎁  Press E to open chest ${window.GAME.nearChest.userData.index + 1}`;

  zones.forEach((zone, i) => {

      original();
      window.GAME.visitedZones.add(i);
      if (window.GAME.checkFinale) window.GAME.checkFinale();
    };

<script>
/* ============================================================
   M5 — GRAND FINALE
   Triggers after all 4 locations visited:
   confetti, particle burst, birthday card overlay
============================================================ */
(function buildFinale() {

  // ── Confetti canvas (2D overlay) ──────────────────────────
  const confCv = document.createElement('canvas');
  confCv.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:60;';
  confCv.width  = window.innerWidth;
  confCv.height = window.innerHeight;
  document.body.appendChild(confCv);
  const cctx = confCv.getContext('2d');
  window.addEventListener('resize', () => {
    confCv.width  = window.innerWidth;
    confCv.height = window.innerHeight;
  });

  let confPcs = [], confRunning = false;

  function startConfetti() {
    confPcs = Array.from({ length: 260 }, () => ({
      x:   Math.random() * confCv.width,
      y:   -20 - Math.random() * 400,
      vx:  (Math.random() - 0.5) * 5,
      vy:  2.5 + Math.random() * 5,
      w:   8  + Math.random() * 10,
      h:   5  + Math.random() * 6,
      rot: Math.random() * Math.PI * 2,
      rs:  (Math.random() - 0.5) * 0.22,
      c:   ['#ff85c1','#ffcf70','#a78bfa','#7dd3fc','#86efac','#fda4af','#fbbf24'][
              Math.floor(Math.random() * 7)]
    }));
    confRunning = true;
    drawConfetti();
  }

  function drawConfetti() {
    if (!confRunning) return;
    cctx.clearRect(0, 0, confCv.width, confCv.height);
    confPcs.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rot += p.rs;
      cctx.save();
      cctx.translate(p.x, p.y);
      cctx.rotate(p.rot);
      cctx.fillStyle = p.c;
      cctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      cctx.restore();
    });
    confPcs = confPcs.filter(p => p.y < confCv.height + 40);
    if (confPcs.length) requestAnimationFrame(drawConfetti);
    else { confRunning = false; cctx.clearRect(0, 0, confCv.width, confCv.height); }
  }

  // ── 3D particle burst ─────────────────────────────────────
  function spawnParticleBurst() {
    const scene = window.GAME.scene;
    const colors = [0xff85c1, 0xffcf70, 0xa78bfa, 0x7dd3fc, 0x86efac, 0xfbbf24];
    const parts = [];
    for (let i = 0; i < 80; i++) {
      const m = new THREE.Mesh(
        new THREE.SphereGeometry(0.1 + Math.random() * 0.12, 4, 3),
        new THREE.MeshBasicMaterial({ color: colors[Math.floor(Math.random() * colors.length)] })
      );
      const player = window.GAME.player;
      m.position.copy(player ? player.position : new THREE.Vector3(0, 1, 0));
      m.position.y += 1.5;
      const angle = Math.random() * Math.PI * 2;
      const elev  = (Math.random() - 0.3) * Math.PI;
      const speed = 0.12 + Math.random() * 0.25;
      m.userData.v = new THREE.Vector3(
        Math.cos(angle) * Math.cos(elev) * speed,
        Math.sin(elev) * speed + 0.1,
        Math.sin(angle) * Math.cos(elev) * speed
      );
      m.userData.life  = 1;
      m.userData.decay = 0.012 + Math.random() * 0.015;
      scene.add(m);
      parts.push(m);
    }

    // Animate particles via updater
    const updater = function() {
      for (let i = parts.length - 1; i >= 0; i--) {
        const p = parts[i];
        p.userData.life -= p.userData.decay;
        p.position.add(p.userData.v);
        p.userData.v.y -= 0.005;
        p.scale.setScalar(Math.max(0, p.userData.life));
        if (p.userData.life <= 0) {
          scene.remove(p);
          parts.splice(i, 1);
        }
      }
      if (parts.length === 0) {
        const idx = window.GAME.updaters.indexOf(updater);
        if (idx > -1) window.GAME.updaters.splice(idx, 1);
      }
    };
    window.GAME.updaters.push(updater);
  }

      <div style="font-size:2.8rem;margin-bottom:10px;animation:floatEmoji 2.5s ease-in-out infinite;">🎂</div>
      <div style="
        height:2px;width:70%;margin:0 auto 18px;border-radius:2px;
        background:linear-gradient(90deg,transparent,#ff85c1,#c084fc,#ff85c1,transparent);
      "></div>
      <p style="
        font-family:'Georgia',serif;
        font-size:clamp(1.3rem,3.5vw,2rem);
        line-height:1.75;font-weight:700;
        background:linear-gradient(135deg,#c0005a,#7c1fa8,#c0006a);
        -webkit-background-clip:text;-webkit-text-fill-color:transparent;

      ">
        Happy Birthday, Mana 🌸<br>

        of this little world I made for you.<br><br>
        I hope it made you smile even<br>
        half as much as you make me smile<br>
        every single day. 🤍
      </p>
      <div style="
        height:2px;width:70%;margin:0 auto 22px;border-radius:2px;
        background:linear-gradient(90deg,transparent,#c084fc,#ff85c1,#c084fc,transparent);
      "></div>
      <button onclick="document.getElementById('finale-card').style.display='none';window.GAME.uiOpen=false;" style="
        background:linear-gradient(135deg,#f472b6,#a855f7);
        color:#fff;border:none;border-radius:50px;
        padding:13px 40px;font-size:1rem;
        font-family:'Georgia',serif;font-weight:700;
        cursor:pointer;letter-spacing:0.06em;
        box-shadow:0 6px 22px rgba(168,85,247,0.38);
      ">Thank you ✨</button>
    </div>
  `;
  document.body.appendChild(card);

  // Floating emoji animation
  const style = document.createElement('style');
  style.textContent = `
    @keyframes floatEmoji {
      0%,100% { transform:translateY(0); }
      50%      { transform:translateY(-10px); }
    }
  `;
  document.head.appendChild(style);

  // ── Finale trigger ────────────────────────────────────────
  let finaleFired = false;

  window.GAME.checkFinale = function() {
    if (finaleFired) return;
    const visited = window.GAME.visitedZones;
    // All 4 zones: 0=fountain, 1=pizza, 2=piercing, 3=horse
    if (visited.size < 4) return;

    finaleFired = true;

    // Small delay so the last UI is seen first
    setTimeout(() => {
      spawnParticleBurst();
      startConfetti();

      card.style.display = 'flex';
      window.GAME.uiOpen = true;
      requestAnimationFrame(() => { card.style.opacity = '1'; });

      // Second burst after a beat
      setTimeout(spawnParticleBurst, 1200);
      setTimeout(spawnParticleBurst, 2400);
    }, 800);
  };

  // ── Progress HUD dots ─────────────────────────────────────
  const progressBar = document.createElement('div');
  progressBar.style.cssText = `
    position:fixed;bottom:56px;left:50%;transform:translateX(-50%);
    display:flex;gap:10px;align-items:center;pointer-events:none;z-index:10;
    background:rgba(10,5,20,0.55);padding:8px 18px;border-radius:30px;

    wrap.appendChild(dot);
    wrap.appendChild(lbl);
    progressBar.appendChild(wrap);
    return { dot, lbl };
  });
  document.body.appendChild(progressBar);

  // Update dots when zones are visited
  const originalCheck = window.GAME.checkFinale;
  window.GAME.checkFinale = function() {
    const visited = window.GAME.visitedZones;

  console.log('[M5] Finale system ready — visit all 4 locations to unlock 🎂');
})();

    const slot = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.1, 0.1), goldDark);
    slot.position.set(0, 0.78, 0.6); g.add(slot);

    // ── Gemstone on lid center ────────────────────────────────
    const gem = new THREE.Mesh(new THREE.OctahedronGeometry(0.1, 0), gemMat);
    gem.position.set(0, 0.38, 0.5);
    gem.rotation.y = Math.PI / 4;
    lid.add(gem);

    // Gem setting ring
    const gemRing = new THREE.Mesh(new THREE.TorusGeometry(0.12, 0.03, 6, 10), goldMat);
    gemRing.rotation.x = Math.PI / 2;
    gemRing.position.set(0, 0.36, 0.5);
    lid.add(gemRing);

    // ── Decorative rivets ─────────────────────────────────────
    [[-0.58,0.25,0.52],[0.58,0.25,0.52],[-0.58,0.55,0.52],[0.58,0.55,0.52],
     [-0.58,0.75,0.52],[0.58,0.75,0.52]].forEach(([rx,ry,rz]) => {
      const rivet = new THREE.Mesh(new THREE.SphereGeometry(0.045, 6, 5), goldMat);
      rivet.position.set(rx, ry, rz);
      g.add(rivet);
    });

    // ── Feet ─────────────────────────────────────────────────
    [[-0.55,0.06,0.38],[0.55,0.06,0.38],[-0.55,0.06,-0.38],[0.55,0.06,-0.38]].forEach(([fx,fy,fz]) => {
      const foot = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.08, 0.12, 6), goldDark);
      foot.position.set(fx, fy, fz);
      g.add(foot);
    });

    // ── Glowing aura ─────────────────────────────────────────
    // Inner glow orb — tight and bright
    const innerGlow = new THREE.Mesh(
      new THREE.SphereGeometry(0.22, 12, 12),
      new THREE.MeshBasicMaterial({ color: 0xffe566, transparent: true, opacity: 0.9 })
    );
    innerGlow.position.y = 1.95;
    g.add(innerGlow);
    g.userData.innerGlow = innerGlow;

    // Mid glow
    const midGlow = new THREE.Mesh(
      new THREE.SphereGeometry(0.42, 10, 10),
      new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.45, depthWrite: false })
    );
    midGlow.position.y = 1.95;
    g.add(midGlow);
    g.userData.midGlow = midGlow;

    // Outer soft halo
    const outerGlow = new THREE.Mesh(
      new THREE.SphereGeometry(0.75, 10, 10),
      new THREE.MeshBasicMaterial({ color: 0xffec80, transparent: true, opacity: 0.18, depthWrite: false })
    );
    outerGlow.position.y = 1.95;
    g.add(outerGlow);
    g.userData.outerGlow = outerGlow;

    // Sparkle ring — small gold dots orbiting
    const sparkleGroup = new THREE.Group();
    sparkleGroup.position.y = 1.95;
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2;
      const sp = new THREE.Mesh(
        new THREE.SphereGeometry(0.06, 5, 4),
        new THREE.MeshBasicMaterial({ color: 0xfffaaa })
      );
      sp.position.set(Math.cos(a) * 0.55, Math.sin(a) * 0.2, Math.sin(a) * 0.55);
      sparkleGroup.add(sp);
    }
    g.add(sparkleGroup);
    g.userData.sparkleGroup = sparkleGroup;

    g.position.set(x, gy + 0.12, z);
    g.rotation.y    = Math.random() * Math.PI * 2;
    g.userData.index   = index;
    g.userData.opened  = false;
    g.userData.phase   = Math.random() * Math.PI * 2;
    scene.add(g);
    return g;
  }

  const chests = POSITIONS.map(([x, z], i) => makeChest(x, z, i));

  // ── Sparkle particle burst on open ───────────────────────
  function spawnSparkles(pos) {
    const colors = [0xffe066, 0xff85c1, 0xa78bfa, 0x7dd3fc, 0xfbbf24, 0x86efac];
    const parts  = [];
    for (let i = 0; i < 35; i++) {
      const m = new THREE.Mesh(
        new THREE.SphereGeometry(0.07 + Math.random() * 0.08, 4, 3),
        new THREE.MeshBasicMaterial({ color: colors[Math.floor(Math.random() * colors.length)] })
      );
      m.position.copy(pos);
      m.position.y += 0.6;
      const angle = Math.random() * Math.PI * 2;
      const elev  = Math.random() * Math.PI;
      const spd   = 0.08 + Math.random() * 0.18;
      m.userData.v    = new THREE.Vector3(
        Math.cos(angle) * Math.cos(elev) * spd,
        Math.abs(Math.sin(elev)) * spd + 0.06,
        Math.sin(angle) * Math.cos(elev) * spd
      );
      m.userData.life  = 1;
      m.userData.decay = 0.018 + Math.random() * 0.018;
      scene.add(m);
      parts.push(m);
    }
    const updater = function() {
      for (let i = parts.length - 1; i >= 0; i--) {
        const p = parts[i];
        p.userData.life -= p.userData.decay;
        p.position.add(p.userData.v);
        p.userData.v.y -= 0.004;
        p.scale.setScalar(Math.max(0, p.userData.life));
        if (p.userData.life <= 0) { scene.remove(p); parts.splice(i, 1); }
      }
      if (!parts.length) {
        const idx = window.GAME.updaters.indexOf(updater);
        if (idx > -1) window.GAME.updaters.splice(idx, 1);
      }
    };
    window.GAME.updaters.push(updater);
  }

  // ── Message popup UI ──────────────────────────────────────
  const msgOverlay = document.createElement('div');
  msgOverlay.style.cssText = `
    position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    z-index:50;background:rgba(5,2,18,0.82);font-family:Georgia,serif;
  `;
  document.body.appendChild(msgOverlay);

  function showMessage(index) {
    const msg = MESSAGES[index];
    msgOverlay.innerHTML = `
      <div style="
        max-width:460px;width:88%;
        background:linear-gradient(135deg,rgba(255,220,240,0.96),rgba(240,210,255,0.96));
        border:2px solid rgba(255,160,210,0.6);
        border-radius:28px;padding:40px 44px 32px;text-align:center;
        box-shadow:0 8px 48px rgba(255,100,180,0.3);
        animation:chestPop 0.45s cubic-bezier(.34,1.56,.64,1);
      ">
        <div style="font-size:1.8rem;margin-bottom:6px">💌</div>
        <div style="
          font-size:0.72rem;letter-spacing:0.14em;color:#a855f7;
          text-transform:uppercase;margin-bottom:8px;
        ">Chest ${index + 1} of 21</div>
        <h3 style="
          font-size:1.35rem;color:#9b1d6b;margin-bottom:18px;letter-spacing:0.04em;
        ">${msg.title}</h3>
        <div style="
          height:1px;width:60%;margin:0 auto 18px;
          background:linear-gradient(90deg,transparent,#ff85c1,transparent);
        "></div>
        <p style="
          font-size:0.97rem;line-height:1.85;color:#4a1a3a;
        ">${msg.text}</p>
        <div style="
          height:1px;width:60%;margin:20px auto 22px;
          background:linear-gradient(90deg,transparent,#c084fc,transparent);
        "></div>
        <div style="font-size:0.8rem;color:#a855f7;margin-bottom:20px;">
          ${openedCount} / 21 chests found 🗝️
        </div>
        <button id="chest-close-btn" style="
          background:linear-gradient(135deg,#f472b6,#a855f7);
          color:#fff;border:none;border-radius:50px;
          padding:11px 36px;font-size:0.9rem;
          font-family:Georgia,serif;cursor:pointer;
          letter-spacing:0.05em;
          box-shadow:0 4px 18px rgba(168,85,247,0.38);
        ">Keep exploring 🌸</button>
      </div>
    `;
    msgOverlay.style.display = 'flex';
    window.GAME.uiOpen = true;
    document.getElementById('chest-close-btn').onclick = () => {
      msgOverlay.style.display = 'none';
      window.GAME.uiOpen = false;
      if (openedCount === 21) triggerGrandFinale();
    };
  }

  // Animation keyframe
  const styleEl = document.createElement('style');
  styleEl.textContent = `
    @keyframes chestPop {
      from { transform:scale(0.7); opacity:0; }
      to   { transform:scale(1);   opacity:1; }
    }
    @keyframes floatEmoji {
      0%,100% { transform:translateY(0); }
      50%      { transform:translateY(-10px); }
    }
  `;
  document.head.appendChild(styleEl);

  // ── Open animation ────────────────────────────────────────
  function openChest(chest) {
    if (chest.userData.opened) return;
    chest.userData.opened = true;
    openedCount++;
    updateHUD();
    saveOpenedIndices();

    // Animate lid flipping open
    const lid   = chest.userData.lid;
    let   prog  = 0;

    const anim = function(elapsed, delta) {
      prog += Math.min(delta, 0.05) * 3;
      const t = Math.min(prog, 1);
      lid.rotation.x = -t * (Math.PI * 0.78);
      lid.position.y = 0.97 + Math.sin(t * Math.PI) * 0.2;
      if (prog >= 1) {
        if (chest.userData.innerGlow)  chest.userData.innerGlow.visible  = false;
        if (chest.userData.midGlow)    chest.userData.midGlow.visible    = false;
        if (chest.userData.outerGlow)  chest.userData.outerGlow.visible  = false;
        if (chest.userData.sparkleGroup) chest.userData.sparkleGroup.visible = false;
        if (chest.userData.light)      chest.userData.light.intensity    = 0;
        if (chest.userData.fillLight)  chest.userData.fillLight.intensity = 0;
        const idx = window.GAME.updaters.indexOf(anim);
        if (idx > -1) window.GAME.updaters.splice(idx, 1);
      }
    };
    window.GAME.updaters.push(anim);

    spawnSparkles(chest.position);
    setTimeout(() => showMessage(chest.userData.index), 500);
  }

  // ── Chest counter HUD ─────────────────────────────────────
  let openedCount = 0;

  const hudEl = document.createElement('div');
  hudEl.style.cssText = `
    position:fixed;top:20px;right:24px;
    background:rgba(10,5,20,0.65);
    border:1px solid rgba(249,212,232,0.25);
    border-radius:20px;padding:7px 16px;
    color:#f9d4e8;font-family:Georgia,serif;
    font-size:0.8rem;letter-spacing:0.06em;
    pointer-events:none;z-index:10;
  `;
  hudEl.textContent = '🗝️ 0 / 21 chests';
  document.body.appendChild(hudEl);

  function updateHUD() {
    hudEl.textContent = `🗝️ ${openedCount} / 21 chests`;
    if (openedCount === 21) hudEl.style.color = '#ffd700';
  }

  // ── Progress persistence — survive a page refresh/close ───
  // Works because this is a real hosted/downloaded page, not a sandboxed
  // preview — localStorage is scoped per-origin like any normal site.
  const SAVE_KEY = 'manaBirthdayGame_openedChests_v1';

  function saveOpenedIndices() {
    try {
      const opened = chests.filter(c => c.userData.opened).map(c => c.userData.index);
      localStorage.setItem(SAVE_KEY, JSON.stringify(opened));
    } catch (e) { /* private browsing / storage disabled — fail silently */ }
  }

  function loadOpenedIndices() {
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) { return []; }
  }

  // Instantly apply the "already open" end-state — no animation, sparkles,
  // or message popup, since she's already seen all of that.
  function restoreOpenedChest(chest) {
    chest.userData.opened = true;
    const lid = chest.userData.lid;
    if (lid) {
      lid.rotation.x = -(Math.PI * 0.78);
      lid.position.y = 0.97;
    }
    if (chest.userData.innerGlow)    chest.userData.innerGlow.visible    = false;
    if (chest.userData.midGlow)      chest.userData.midGlow.visible      = false;
    if (chest.userData.outerGlow)    chest.userData.outerGlow.visible    = false;
    if (chest.userData.sparkleGroup) chest.userData.sparkleGroup.visible = false;
    openedCount++;
  }

  loadOpenedIndices().forEach(idx => {
    const chest = chests.find(c => c.userData.index === idx);
    if (chest && !chest.userData.opened) restoreOpenedChest(chest);
  });
  updateHUD();

  // ── Grand finale when all 21 opened ──────────────────────
  function triggerGrandFinale() {
    // Confetti
    const confCv = document.createElement('canvas');
    confCv.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:60;';
    confCv.width = window.innerWidth; confCv.height = window.innerHeight;
    document.body.appendChild(confCv);
    const cctx = confCv.getContext('2d');
    let pieces = Array.from({ length: 280 }, () => ({
      x: Math.random() * confCv.width, y: -20 - Math.random() * 400,
      vx: (Math.random() - 0.5) * 5, vy: 2.5 + Math.random() * 5,
      w: 8 + Math.random() * 10, h: 5 + Math.random() * 6,
      rot: Math.random() * Math.PI * 2, rs: (Math.random() - 0.5) * 0.22,
      c: ['#ff85c1','#ffcf70','#a78bfa','#7dd3fc','#fda4af','#fbbf24'][Math.floor(Math.random()*6)]
    }));
    (function drawConf() {
      cctx.clearRect(0, 0, confCv.width, confCv.height);
      pieces.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.rot += p.rs;
        cctx.save(); cctx.translate(p.x, p.y); cctx.rotate(p.rot);
        cctx.fillStyle = p.c; cctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        cctx.restore();
      });
      pieces = pieces.filter(p => p.y < confCv.height + 40);
      if (pieces.length) requestAnimationFrame(drawConf);
      else { cctx.clearRect(0, 0, confCv.width, confCv.height); confCv.remove(); }
    })();

    // Final card
    const card = document.createElement('div');
    card.style.cssText = `
      position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
      z-index:55;background:rgba(5,2,18,0.85);
      opacity:0;transition:opacity 1.8s ease;
    `;
    card.innerHTML = `
      <div style="
        max-width:560px;width:88%;
        background:linear-gradient(135deg,rgba(255,220,240,0.95),rgba(240,210,255,0.95),rgba(255,240,200,0.95));
        border:2.5px solid rgba(255,160,210,0.7);border-radius:32px;
        padding:48px 56px 40px;text-align:center;
        box-shadow:0 8px 48px rgba(255,100,180,0.35);
      ">
        <div style="font-size:3rem;margin-bottom:10px;animation:floatEmoji 2.5s ease-in-out infinite;">🎂</div>
        <div style="height:2px;width:65%;margin:0 auto 20px;border-radius:2px;
          background:linear-gradient(90deg,transparent,#ff85c1,#c084fc,#ff85c1,transparent);"></div>
        <p style="
          font-family:Georgia,serif;font-size:clamp(1.1rem,3vw,1.5rem);
          line-height:1.85;font-weight:700;margin-bottom:20px;
          background:linear-gradient(135deg,#c0005a,#7c1fa8,#c0006a);
          -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
        ">
          You found all 21 chests. 👑<br><br>
          Happy birthday, Mana.<br>
          This whole little world was made<br>
          because you deserve magic<br>
          on every ordinary day. 🌸
        </p>
        <div style="height:2px;width:65%;margin:0 auto 24px;border-radius:2px;
          background:linear-gradient(90deg,transparent,#c084fc,#ff85c1,#c084fc,transparent);"></div>
        <button onclick="this.closest('div[style]').parentElement.remove()" style="
          background:linear-gradient(135deg,#f472b6,#a855f7);color:#fff;
          border:none;border-radius:50px;padding:13px 40px;
          font-size:1rem;font-family:Georgia,serif;cursor:pointer;
          letter-spacing:0.06em;box-shadow:0 6px 22px rgba(168,85,247,0.38);
        ">Thank you ✨</button>
      </div>
    `;
    document.body.appendChild(card);
    requestAnimationFrame(() => { card.style.opacity = '1'; });

    // Triple sparkle bursts
    const player = window.GAME.player;
    if (player) {
      spawnSparkles(player.position);
      setTimeout(() => spawnSparkles(player.position), 800);
      setTimeout(() => spawnSparkles(player.position), 1600);
    }
  }

  // ── Glow pulse animation + proximity detection ────────────
  window.GAME.updaters.push(function(elapsed) {
    chests.forEach(chest => {
      if (chest.userData.opened) return;
      const phase = chest.userData.phase;
      const pulse = Math.sin(elapsed * 2.2 + phase);
      const slow  = Math.sin(elapsed * 1.1 + phase);

      // Three-layer glow pulse
      if (chest.userData.innerGlow) {
        chest.userData.innerGlow.material.opacity = 0.75 + pulse * 0.2;
        chest.userData.innerGlow.scale.setScalar(0.9 + pulse * 0.12);
      }
      if (chest.userData.midGlow) {
        chest.userData.midGlow.material.opacity = 0.3 + pulse * 0.18;
        chest.userData.midGlow.scale.setScalar(0.95 + slow * 0.1);
        chest.userData.midGlow.position.y = 1.95 + Math.sin(elapsed * 1.8 + phase) * 0.08;
      }
      if (chest.userData.outerGlow) {
        chest.userData.outerGlow.material.opacity = 0.1 + Math.abs(slow) * 0.12;
        chest.userData.outerGlow.scale.setScalar(1.0 + slow * 0.15);
      }

      // Sparkle ring orbits slowly
      if (chest.userData.sparkleGroup) {
        chest.userData.sparkleGroup.rotation.y = elapsed * 1.2 + phase;
        chest.userData.sparkleGroup.position.y = 1.95 + Math.sin(elapsed * 1.5 + phase) * 0.12;
      }
    });
  });

  // ── E-key interaction — uses shared prompt from M4 ────────
  const CHEST_RADIUS = 2.8;
  const CHEST_LIGHT_RADIUS = 7;
  window.GAME.nearChest = null;
  window.GAME.openChest = openChest;  // expose so M4 E-key can call it

  // One shared warm light that follows whichever unopened chest is nearest
  // the player, instead of 42 permanently-active lights (much cheaper —
  // every extra simultaneous light adds a lighting calculation to every
  // shaded pixel in the whole scene, every frame).
  const sharedChestLight = new THREE.PointLight(0xffd700, 0, 9);
  sharedChestLight.position.y = 1.6;
  scene.add(sharedChestLight);
  const sharedChestFill = new THREE.PointLight(0xffaa00, 0, 5);
  scene.add(sharedChestFill);

  window.GAME.updaters.push(function(elapsed) {
    if (!window.GAME.player || window.GAME.uiOpen) return;
    const px = window.GAME.player.position.x;
    const pz = window.GAME.player.position.z;

    window.GAME.nearChest = null;
    let nearest = Infinity;
    let closestChest = null;
    let closestDist = Infinity;

    chests.forEach(chest => {
      if (chest.userData.opened) return;
      const d = Math.sqrt((px - chest.position.x)**2 + (pz - chest.position.z)**2);
      if (d < CHEST_RADIUS && d < nearest) {
        nearest = d;
        window.GAME.nearChest = chest;
      }
      if (d < closestDist) { closestDist = d; closestChest = chest; }
    });

    if (closestChest && closestDist < CHEST_LIGHT_RADIUS) {
      const fade  = 1 - (closestDist / CHEST_LIGHT_RADIUS);
      const phase = closestChest.userData.phase;
      const pulse = Math.sin(elapsed * 2.2 + phase);
      const slow  = Math.sin(elapsed * 1.1 + phase);
      sharedChestLight.position.set(closestChest.position.x, closestChest.position.y + 1.6, closestChest.position.z);
      sharedChestFill.position.set(closestChest.position.x, closestChest.position.y + 0.3, closestChest.position.z);
      sharedChestLight.intensity = Math.max(0, (1.4 + pulse * 0.7) * fade);
      sharedChestFill.intensity  = Math.max(0, (0.4 + Math.abs(slow) * 0.3) * fade);
    } else {
      sharedChestLight.intensity = 0;
      sharedChestFill.intensity = 0;
    }
  });

  console.log('[M5] 21 treasure chests placed — go find them all 🗝️');
})();
</script>

<script>
/* ============================================================
   M6 — MOBILE TOUCH CONTROLS
   Virtual joystick (move) + interact button, shown only on
   touch devices. Drives the same `keys` object the keyboard
   uses, so it plugs into the existing movement code untouched.
============================================================ */
(function buildTouchControls() {
  const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0 ||
                   window.matchMedia('(hover: none) and (pointer: coarse)').matches;
  if (!isTouch) return;

  // Update the controls hint for touch users
  const hint = document.getElementById('controls-hint');
  if (hint) hint.innerHTML = 'Joystick — move<br>✋ — interact';

  // ── Virtual joystick ───────────────────────────────────────
  const JOY_SIZE  = 110;
  const JOY_KNOB  = 46;
  const DEADZONE  = 0.28; // fraction of radius before a direction registers

  const joyBase = document.createElement('div');
  joyBase.style.cssText = `
    position:fixed; left:26px; bottom:26px;
    width:${JOY_SIZE}px; height:${JOY_SIZE}px; border-radius:50%;
    background:rgba(10,5,20,0.35); border:1px solid rgba(249,212,232,0.35);
    z-index:40; touch-action:none;
  `;
  const joyKnob = document.createElement('div');
  joyKnob.style.cssText = `
    position:absolute; left:${(JOY_SIZE-JOY_KNOB)/2}px; top:${(JOY_SIZE-JOY_KNOB)/2}px;
    width:${JOY_KNOB}px; height:${JOY_KNOB}px; border-radius:50%;
    background:rgba(249,212,232,0.55); border:1px solid rgba(249,212,232,0.7);
    transition:transform 0.05s linear;
  `;
  joyBase.appendChild(joyKnob);
  document.body.appendChild(joyBase);

  // ── Interact button ─────────────────────────────────────────
  const interactBtn = document.createElement('div');
  interactBtn.textContent = '✋';
  interactBtn.style.cssText = `
    position:fixed; right:28px; bottom:34px;
    width:72px; height:72px; border-radius:50%;
    background:rgba(10,5,20,0.45); border:1px solid rgba(249,212,232,0.4);
    color:#f9d4e8; font-size:1.6rem;
    display:flex; align-items:center; justify-content:center;
    z-index:40; touch-action:none; user-select:none;
  `;
  document.body.appendChild(interactBtn);

  interactBtn.addEventListener('touchstart', e => {
    e.preventDefault();
    interactBtn.style.transform = 'scale(0.9)';
    window.GAME.interact();
  }, { passive: false });
  interactBtn.addEventListener('touchend', e => {
    e.preventDefault();
    interactBtn.style.transform = 'scale(1)';
  }, { passive: false });

  // ── Joystick drag logic ──────────────────────────────────────
  const keys = window.GAME.keys || (window.GAME.keys = {});
  let touchId = null;
  let baseRect = null;

  function resetKeys() {
    keys['KeyW'] = keys['KeyA'] = keys['KeyS'] = keys['KeyD'] = false;
  }

  function handleMove(clientX, clientY) {
    const cx = baseRect.left + baseRect.width / 2;
    const cy = baseRect.top + baseRect.height / 2;
    let dx = clientX - cx;
    let dy = clientY - cy;
    const radius = baseRect.width / 2;
    const dist = Math.min(Math.sqrt(dx*dx + dy*dy), radius);
    const angle = Math.atan2(dy, dx);
    const knobDist = dist;
    joyKnob.style.transform = `translate(${Math.cos(angle)*knobDist}px, ${Math.sin(angle)*knobDist}px)`;

    const frac = dist / radius;
    resetKeys();
    if (frac > DEADZONE) {
      const nx = Math.cos(angle), ny = Math.sin(angle);
      if (ny < -0.35) keys['KeyW'] = true;
      if (ny >  0.35) keys['KeyS'] = true;
      if (nx < -0.35) keys['KeyA'] = true;
      if (nx >  0.35) keys['KeyD'] = true;
    }
  }

  joyBase.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.changedTouches[0];
    touchId = t.identifier;
    baseRect = joyBase.getBoundingClientRect();
    handleMove(t.clientX, t.clientY);
  }, { passive: false });

  joyBase.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier === touchId) handleMove(t.clientX, t.clientY);
    }
  }, { passive: false });

  function endTouch(e) {
    for (const t of e.changedTouches) {
      if (t.identifier === touchId) {
        touchId = null;
        joyKnob.style.transform = 'translate(0,0)';
        resetKeys();
      }
    }
  }
  joyBase.addEventListener('touchend', endTouch, { passive: false });
  joyBase.addEventListener('touchcancel', endTouch, { passive: false });

  // Hide controls while a UI overlay (chest message, building menu) is open
  window.GAME.updaters.push(function() {
    const hide = !!window.GAME.uiOpen;
    joyBase.style.display = hide ? 'none' : 'block';
    interactBtn.style.display = hide ? 'none' : 'flex';
  });

  console.log('[M6] Touch controls ready 📱');
})();
</script>
